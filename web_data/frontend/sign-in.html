<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<meta http-equiv="X-UA-Compatible" content="ie=edge" />
	<title>Tabler - Premium and Open Source dashboard template with responsive and high quality UI.</title>
	<!-- CSS files -->
	<link href="./dist/css/tabler.min.css" rel="stylesheet" />
	<link href="./dist/css/tabler-flags.min.css" rel="stylesheet" />
	<link href="./dist/css/tabler-socials.min.css" rel="stylesheet" />
	<link href="./dist/css/tabler-payments.min.css" rel="stylesheet" />
	<link href="./dist/css/tabler-vendors.min.css" rel="stylesheet" />
	<link href="./dist/css/tabler-marketing.min.css" rel="stylesheet" />
	<link href="./dist/css/demo.min.css" rel="stylesheet" />
	<style>
		@import url('https://rsms.me/inter/inter.css');
	</style>
</head>

<body class=" d-flex flex-column">
	<script src="./dist/js/demo-theme.min.js"></script>
	<script src="./dist/customjs/sign_in.js?v=0.0.18"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js"></script>
	<div class="page">
		<div class="container container-tight py-4">
			<div class="text-center mb-4">
				<a href=".">
					<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" iewBox="0 0 232 68"
						class="navbar-brand-image" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"
						stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-zoom">
						<path stroke="none" d="M0 0h24v24H0z" fill="none" />
						<path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
						<path d="M21 21l-6 -6" />
					</svg>
				</a>
			</div>
			<div class="card card-md">
				<div class="card-body">
					<h2 class="h2 text-center mb-4">Login to your account</h2>
					<form novalidate>
						<div class="mb-3">
							<label class="form-label">Email address</label>
							<input type="username" class="form-control" placeholder="LeakLense" autocomplete="off">
						</div>
						<div class="mb-2">
							<label class="form-label">
								Password
								<span class="form-label-description">
									<a href="./forgot-password.html">I forgot password</a>
								</span>
							</label>
							<div class="input-group input-group-flat">
								<input type="password" class="form-control" placeholder="Your password"
									autocomplete="off">
								<span class="input-group-text">
									<a href="#" class="link-secondary" title="Show password" data-bs-toggle="tooltip">
										<!-- Download SVG icon from http://tabler.io/icons/icon/eye -->
										<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
											viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
											stroke-linecap="round" stroke-linejoin="round" class="icon icon-1">
											<path d="M10 12a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" />
											<path
												d="M21 12c-2.4 4 -5.4 6 -9 6c-3.6 0 -6.6 -2 -9 -6c2.4 -4 5.4 -6 9 -6c3.6 0 6.6 2 9 6" />
										</svg>
									</a>
								</span>
							</div>
						</div>
						<div class="form-footer">
							<button type="submit" class="btn btn-primary w-100">Sign in</button>
						</div>
					</form>
				</div>
			</div>
			<div class="text-center text-secondary mt-3">
				Don't have account yet? 	<a href="./sign-up.html" tabindex="-1">Sign up</a>
			</div>
		</div>
	</div>
	<!-- Libs JS -->
	<!-- Tabler Core -->
	<script src="./dist/js/tabler.min.js" defer></script>
	<script src="./dist/js/demo.min.js" defer></script>
</body>

</html>
