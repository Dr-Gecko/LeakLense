title: LeakLense Docs
description: Documentation for LeakLense
theme: just-the-docs

url: https://dr-gecko.github.io/LeakLense/
color_scheme: dark
aux_links:
  Template Repository: https://github.com/just-the-docs/just-the-docs-template
search_enabled: true

search:
  heading_level: 4
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false
  focus_shortcut_key: 'k'

mermaid:
  version: "9.1.3"
defaults:
- scope:
    path: "docs"
    type: "pages"
  values:
    layout: "default"
